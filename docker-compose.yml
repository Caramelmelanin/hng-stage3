version: "3.8"

services:
  nginx:
    image: nginx:alpine
    container_name: hng-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - hng-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    restart: unless-stopped

  nextcloud:
    image: kefaslungu/hng-nextcloud
    container_name: hng-nextcloud
    volumes:
      - nextcloud-data:/var/www/html
      - hng-nginx-logs:/var/log/nginx:ro
    restart: unless-stopped
    expose:
      - "80"

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: hng-detector
    volumes:
      - hng-nginx-logs:/var/log/nginx:ro
    network_mode: host
    cap_add:
      - NET_ADMIN
    restart: unless-stopped
    depends_on:
      - nginx

volumes:
  hng-nginx-logs:
    name: HNG-nginx-logs
  nextcloud-data:
